<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Форма Отчет</title>
<link rel="icon" type="image/png" href="logo-makkuin.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #f0ebf8; font-family: 'Roboto', sans-serif; font-size: 12px; }
.container { max-width: 1000px; margin: 40px auto; padding: 0 10px; }
.header { background: #673ab7; height: 10px; border-radius: 8px 8px 0 0; }
.form-title { background: #fff; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 15px; text-align:center; }
h1 { margin: 0; font-size: 24px; }
.question-card { background: #fff; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); border-left: 4px solid #673ab7; border-right: 4px solid #673ab7; }
label { display:block; margin-bottom:4px; font-weight:500; }
textarea, select, input[type="text"], input[type="tel"] { width: 100%; border: none; border-bottom: 2px solid #dadce0; padding: 4px 6px; font-size: 14px; background: transparent; }
textarea:focus, select:focus, input:focus { outline: none; border-bottom: 2px solid #673ab7; }
select { appearance: none; cursor: pointer; }
.currency-input { position: relative; display: flex; align-items: center; }
.currency-input .currency-left { position: absolute; left: 6px; font-weight: 500; color: #000; pointer-events: none; }
.currency-input input { width: 100%; padding-left: 18px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: #fff; }
.submit-box { background: #fff; padding: 20px; border-radius: 8px; text-align: right; box-shadow: 0 1px 5px rgba(0,0,0,0.1); margin: 0 auto 20px auto; position: relative; }
button { background: #673ab7; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
button:disabled { background: #aaa; cursor: not-allowed; }

#statusMsg { font-size: 13px; font-weight: bold; margin-bottom: 10px; text-align: center; display: none; min-height: 20px; }
.success { color: #2e7d32; }
.error { color: #d32f2f; }

.history-scroll-container { width: 100%; max-height: 320px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; margin-bottom: 20px; scroll-behavior: smooth; }
#historyTable, #currentTable { width: 100%; border-collapse: collapse; font-size: 11px; }
#historyTable thead, #currentTable thead { position: sticky; top: 0; z-index: 10; }
#historyTable th, #currentTable th { background: #546e7a; color: #fff; padding: 10px; text-transform: uppercase; }
#historyTable td, #currentTable td { padding: 8px 10px; border-bottom: 1px solid #eee; text-align: center; }
#historyTable tr:nth-child(even), #currentTable tr:nth-child(even) { background-color: #f9f9f9; }

#monthlyTable { width: 1000px; border-collapse: separate; border-spacing: 2px; margin-top: 10px; font-size: 10px; }
#monthlyTable th { padding: 6px 2px; text-align: center; border-radius: 5px; font-size: 11px; line-height: 1.2; white-space: normal; vertical-align: middle; }
#monthlyTable td { padding: 4px; text-align: center; border-radius: 5px; position: relative; min-width: 45px; }

.date-col { background: #f2f2f2cc; } 
.expense-col { background: rgba(255,100,100,0.2); color: #800000; }
.income-col { background: rgba(100,150,255,0.2); color: #003366; }
.text-col { background: #f8f8f8cc; text-align: left; padding-left: 5px; min-width: 100px; }
.balance-col { background: rgba(144,238,144,0.3); font-weight: bold; color: #155724; }
.cash-col { background: #fff9c4; font-weight: bold; color: #856404; }
.total-row { background: #37474f !important; color: #fff !important; font-weight: bold; }
.has-val::after { content: '€'; margin-left:1px; font-weight: bold; }
</style>
<script src="https://unpkg.com/parse/dist/parse.min.js"></script>
<script>
Parse.initialize("nRZ2VJnuAxFbP1DPxK524AAL4rUh6avCTbTnQUsL", "MXB3Tw1iF1Cw1HrqKZFFUhf7DHETzaOezipXcPtw");
Parse.serverURL = 'https://parseapi.back4app.com/';
</script>
</head>
<body>
<div class="container">
    <div class="header"></div>
    <div class="form-title"><h1>ОТЧЕТ</h1></div>

    <div class="question-card">
        <label>Избери опция</label>
        <select id="optionSelect">
            <option value="" disabled selected>Избери...</option>
            <optgroup label="ПРИХОДИ">
                <option>ПРИХОД БАР МАККУИН</option>
                <option>ПРИХОД МАККУИН</option>
                <option>ПРИХОД БАР СЪНСЕТ</option>
                <option>ПРИХОД АНИМАТОР</option>
                <option>ПРИХОД КАПАРО</option>
                <option>ДУГИ ПРИХОДИ</option>
                <option>ПЛАЩАНЕ С КАРТА</option>
            </optgroup>
            <optgroup label="РАЗХОДИ">
                <option>РАЗХОД С ФАКТУРИ</option>
                <option>РАЗХОД БЕЗ ФАКТУРИ</option>
                <option>ЗАПЛАТА/АВАНС</option>
            </optgroup>
            <optgroup label="КАСОВИ ОПЕРАЦИИ">
                <option>ВНЕСЕНИ В КАСА</option>
                <option>ИЗНЕСЕНИ ОТ КАСА</option>
            </optgroup>
        </select>
    </div>

    <div class="question-card">
        <label>Въведете сума</label>
        <div class="currency-input">
            <span class="currency-left">€</span>
            <input type="tel" id="amount_field" placeholder="0.00" oninput="this.value = this.value.replace(/[^0-9.]/g, '')">
        </div>
    </div>

    <div class="question-card">
        <label>Пояснения</label>
        <textarea rows="2" id="notes"></textarea>
    </div>

    <div class="submit-box">
        <div id="statusMsg"></div>
        <button id="submitBtn" disabled>Изпрати</button>
    </div>

    <div style="width:100%; border:1px solid #ddd; border-radius:8px; background:#fff; margin-bottom:20px; overflow:hidden;">
        <table id="currentTable">
            <thead>
                <tr><th>Дата</th><th>Опция</th><th>Сума (€)</th><th>Бележки</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="cashBox" style="background:#f5f5ff; border:2px solid #673ab7; border-radius:8px; padding:10px; width:140px; text-align:center; margin: 10px auto;">
        <div id="cashLabel" style="font-size:10px; color:#555;">ТЕКУЩА КАСА</div>
        <div id="currentCash" style="font-size:18px; font-weight:bold; color:#2e7d32;">0.00 €</div>
    </div>

    <div id="passwordPrompt" style="text-align: center; margin-top: 20px;">
        <label>Парола за Месечна база:</label>
        <input type="password" id="monthlyPassword" style="text-align:center; width:100px;">
        <button id="checkPassword">Покажи база</button>
    </div>

    <div id="hiddenReportSection" style="display:none; width:100%; margin-top: 20px;">
        <div id="monthNav" style="display:flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px;">
            <button onclick="changeMonth(-1)">◀ Назад</button>
            <div id="displayMonthYear" style="font-weight:bold; font-size: 16px;"></div>
            <button onclick="changeMonth(1)">Напред ▶</button>
        </div>

        <label style="font-weight: bold; margin-bottom: 5px; display: block; text-align: center;">ХРОНОЛОГИЯ НА ЗАПИСИТЕ ЗА МЕСЕЦА:</label>
        <div class="history-scroll-container" id="historyScroll">
            <table id="historyTable">
                <thead>
                    <tr><th>Дата</th><th>Опция</th><th>Сума (€)</th><th>Бележки</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>

        <div style="overflow-x:auto;">
            <table id="monthlyTable">
                <thead>
                    <tr>
                        <th class="date-col">Дата</th>
                        <th class="expense-col">РАЗХОД<br>ФАКТУРИ</th>
                        <th class="expense-col">РАЗХОД<br>БЕЗ ФАКТ.</th>
                        <th class="expense-col">АВАНС И<br>ЗАПЛАТИ</th>
                        <th class="income-col">БАР<br>МАККУИН</th>
                        <th class="income-col">ПРИХОД<br>МАККУИН</th>
                        <th class="income-col">БАР<br>СЪНСЕТ</th>
                        <th class="income-col">ПРИХОД<br>АНИМАТОР</th>
                        <th class="income-col">ПРИХОД<br>КАПАРО</th>
                        <th class="text-col">№ НА<br>КАПАРО</th>
                        <th class="income-col">ДРУГИ<br>ПРИХОДИ</th>
                        <th class="income-col">ПЛАЩАНЕ<br>КАРТА</th>
                        <th class="balance-col">КРАЙНО<br>САЛДО</th>
                        <th class="cash-col">КАСА<br>НАЛИЧНОСТ</th>
                    </tr>
                </thead>
                <tbody id="monthlyBody"></tbody>
                <tfoot id="monthlyFoot"></tfoot>
            </table>
        </div>
    </div>
</div>

<script>
const todayObj = new Date();
const todayISO = todayObj.toLocaleDateString('sv-SE');
let viewDate = new Date(todayObj.getFullYear(), todayObj.getMonth(), 1);
const monthNames = ["ЯНУАРИ", "ФЕВРУАРИ", "МАРТ", "АПРИЛ", "МАЙ", "ЮНИ", "ЮЛИ", "АВГУСТ", "СЕПТЕМВРИ", "ОКТОМВРИ", "НОЕМВРИ", "ДЕКЕМВРИ"];
const mapping = {
    "РАЗХОД С ФАКТУРИ": 1, "РАЗХОД БЕЗ ФАКТУРИ": 2, "ЗАПЛАТА/АВАНС": 3,
    "ПРИХОД БАР МАККУИН": 4, "ПРИХОД МАККУИН": 5, "ПРИХОД БАР СЪНСЕТ": 6,
    "ПРИХОД АНИМАТОР": 7, "ПРИХОД КАПАРО": 8, "ДУГИ ПРИХОДИ": 10, "ПЛАЩАНЕ С КАРТА": 11
};

function checkForm() {
    const val = parseFloat(document.getElementById('amount_field').value);
    document.getElementById('submitBtn').disabled = !(document.getElementById('optionSelect').value && !isNaN(val));
}
document.getElementById('amount_field').addEventListener('input', checkForm);
document.getElementById('optionSelect').addEventListener('change', checkForm);

function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); loadData(); }

async function loadData() {
    const query = new Parse.Query("ReportEntry");
    query.limit(1000).ascending("date");
    const results = await query.find();
    render(results);
}

function render(results) {
    const m = viewDate.getMonth(), y = viewDate.getFullYear();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    document.getElementById('displayMonthYear').innerText = monthNames[m] + " " + y;

    let globalCash = 0; 
    let monthlyData = Array.from({length: daysInMonth}, () => new Array(14).fill(0));
    let kaparoNotes = new Array(daysInMonth).fill("");
    
    const currentTBody = document.querySelector('#currentTable tbody');
    const historyTBody = document.getElementById('historyBody');
    currentTBody.innerHTML = '';
    historyTBody.innerHTML = '';

    results.sort((a,b) => a.get("date").localeCompare(b.get("date")));

    // 1. Изчисляваме ТЕКУЩА КАСА и попълваме таблиците за детайли
    results.forEach(e => {
        const dStr = e.get("date"), entryDate = new Date(dStr);
        const opt = e.get("option"), val = e.get("sum") || 0, col = mapping[opt];

        if (opt !== "ПЛАЩАНЕ С КАРТА") {
            const isExpense = (opt === "ИЗНЕСЕНИ ОТ КАСА" || [1,2,3].includes(col));
            if (isExpense) globalCash -= val; else globalCash += val;
        }

        if(dStr === todayISO) {
            currentTBody.innerHTML += `<tr><td>${entryDate.getDate()}.${entryDate.getMonth()+1}</td><td>${opt}</td><td>${val.toFixed(2)}</td><td>${e.get("notes")||''}</td></tr>`;
        }

        if(entryDate.getMonth() === m && entryDate.getFullYear() === y) {
            historyTBody.innerHTML += `<tr><td>${entryDate.getDate()}.${entryDate.getMonth()+1}</td><td>${opt}</td><td>${val.toFixed(2)}</td><td>${e.get("notes")||''}</td></tr>`;
            const dIdx = entryDate.getDate() - 1;
            if(col && col !== 9) monthlyData[dIdx][col] += val;
            if(opt === "ПРИХОД КАПАРО") kaparoNotes[dIdx] += (kaparoNotes[dIdx] ? ", " : "") + (e.get("notes") || "");
        }
    });

    document.getElementById('currentCash').textContent = globalCash.toFixed(2) + ' €';
    const hScroll = document.getElementById('historyScroll');
    setTimeout(() => { hScroll.scrollTop = hScroll.scrollHeight; }, 100);

    // 2. ИЗЧИСЛЯВАНЕ НА КРАЙНО САЛДО И КАСА НАЛИЧНОСТ (Кумулативно от началото на времето)
    let runningCumulativeBalance = 0;
    let runningCumulativeCash = 0;
    let dailyBalances = {}; 
    let dailyCashStates = {};

    results.forEach(e => {
        const dStr = e.get("date");
        const opt = e.get("option"), val = e.get("sum") || 0, col = mapping[opt];
        
        // Салдо логика
        if (opt !== "ПЛАЩАНЕ С КАРТА") {
            const isExpense = (opt === "ИЗНЕСЕНИ ОТ КАСА" || [1,2,3].includes(col));
            if (isExpense) runningCumulativeBalance -= val; else runningCumulativeBalance += val;
        }

        // Каса логика (по твоето правило: Изнасяне/Карта + | Внасяне -)
        if(opt === "ИЗНЕСЕНИ ОТ КАСА" || opt === "ПЛАЩАНЕ С КАРТА") {
            runningCumulativeCash += val;
        } else if(opt === "ВНЕСЕНИ В КАСА") {
            runningCumulativeCash -= val;
        }

        dailyBalances[dStr] = runningCumulativeBalance;
        dailyCashStates[dStr] = runningCumulativeCash;
    });

    // 3. Рендиране на таблицата
    const mBody = document.getElementById('monthlyBody');
    mBody.innerHTML = '';
    let colTotals = new Array(14).fill(0);
    
    let lastKnownBalance = 0;
    let lastKnownCash = 0;

    // Намиране на състоянието в края на предходния месец
    const startOfView = new Date(y, m, 1).toLocaleDateString('sv-SE');
    results.forEach(e => { 
        if(e.get("date") < startOfView) {
            lastKnownBalance = dailyBalances[e.get("date")];
            lastKnownCash = dailyCashStates[e.get("date")];
        }
    });

    for(let i=1; i<=daysInMonth; i++) {
        const currentDayStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        
        // Ако има запис за деня, обновяваме стойностите, иначе стоят от вчера
        if (dailyBalances[currentDayStr] !== undefined) lastKnownBalance = dailyBalances[currentDayStr];
        if (dailyCashStates[currentDayStr] !== undefined) lastKnownCash = dailyCashStates[currentDayStr];

        const row = document.createElement('tr');
        for(let j=0; j<14; j++) {
            const td = document.createElement('td');
            if(j===0) td.textContent = `${i}.${m+1}`;
            else if(j===9) td.textContent = kaparoNotes[i-1];
            else if(j===12) { 
                td.textContent = lastKnownBalance.toFixed(2); 
                td.className='balance-col has-val'; 
            }
            else if(j===13) { 
                td.textContent = lastKnownCash.toFixed(2); 
                td.className='cash-col has-val'; 
            }
            else {
                let v = monthlyData[i-1][j];
                if(v !== 0) { td.textContent = v.toFixed(2); td.classList.add('has-val'); colTotals[j] += v; }
            }
            if([1,2,3].includes(j)) td.classList.add('expense-col');
            if([4,5,6,7,8,10,11].includes(j)) td.classList.add('income-col');
            row.appendChild(td);
        }
        mBody.appendChild(row);
    }

    // Totals
    const fRow = document.createElement('tr'); fRow.className = 'total-row';
    for(let j=0; j<14; j++) {
        const td = document.createElement('td');
        if(j===0) td.textContent = "ОБЩО:";
        else if(j===12) td.textContent = lastKnownBalance.toFixed(2);
        else if(j===13) td.textContent = lastKnownCash.toFixed(2);
        else if(j===9) td.textContent = "";
        else { td.textContent = colTotals[j].toFixed(2); if(colTotals[j]!==0) td.classList.add('has-val'); }
        fRow.appendChild(td);
    }
    document.getElementById('monthlyFoot').innerHTML = '';
    document.getElementById('monthlyFoot').appendChild(fRow);
}

document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn'); btn.disabled = true;
    try {
        const Entry = Parse.Object.extend("ReportEntry"), entry = new Entry();
        await entry.save({
            date: todayISO,
            option: document.getElementById('optionSelect').value,
            sum: parseFloat(document.getElementById('amount_field').value),
            notes: document.getElementById('notes').value.trim()
        });
        document.getElementById('amount_field').value = ''; document.getElementById('notes').value = '';
        await loadData();
    } catch(e) { alert("Грешка!"); }
    finally { btn.disabled = false; checkForm(); }
});

function validatePassword() {
    if(document.getElementById('monthlyPassword').value === 'Flamingo3000'){
        document.getElementById('hiddenReportSection').style.display = 'block';
        document.getElementById('passwordPrompt').style.display = 'none';
        loadData();
    } else { alert("Грешна парола"); }
}

document.getElementById('checkPassword').addEventListener('click', validatePassword);
document.getElementById('monthlyPassword').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') validatePassword();
});

loadData();
</script>
</body>
</html>
